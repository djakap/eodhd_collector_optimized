# Prefect deployment configuration (self-hosted, no cloud)
# Docs: https://docs.prefect.io/latest/deploy/infrastructure-concepts/prefect-yaml/

name: eodhd-collector
prefect-version: ">=3.0.0"

# -----------------------------------------------------------------------
# Pull step — use local code (no remote storage needed)
# -----------------------------------------------------------------------
pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

# -----------------------------------------------------------------------
# Deployments
# -----------------------------------------------------------------------
deployments:
  # Full re-collection (all 651 stocks from scratch — use occasionally)
  - name: daily-full
    entrypoint: flows/daily_collection_flow.py:daily_collection_flow
    description: "Full re-collection — all Syariah stocks from scratch (run manually or weekly)"
    work_pool:
      name: default-agent-pool
    parameters:
      stocks_file: config/syariah_stocks.txt
      collect_price: true
      collect_actions: true
      intraday_days: 120
      skip_intraday: false
      skip_validation: true
      update_mode: false
      skip_duplicate_check: false
    schedules:
      # Optional: full re-collection every Sunday at 10:00 WIB
      - cron: "0 3 * * 0"
        timezone: "Asia/Jakarta"
        active: false  # enable if you want weekly full refresh

  # Daily incremental update — fetches only missing data since last run
  # Example: if last data is Feb 2 and today is Feb 5, fetches Feb 3-5
  - name: daily-update
    entrypoint: flows/daily_collection_flow.py:update_collection_flow
    description: "Daily incremental update — fetch missing data for all 651 stocks"
    work_pool:
      name: default-agent-pool
    # On a laptop that is sometimes off: when it wakes, run ONE catch-up run and
    # auto-cancel the piled-up late runs instead of executing them all. The flow
    # is incremental (update_mode), so a single run catches everything up.
    concurrency_limit:
      limit: 1
      collision_strategy: CANCEL_NEW
    parameters:
      stocks_file: config/syariah_stocks.txt
      update_window: 7       # re-fetch last 7 days to catch corrections/adjustments
      skip_intraday: false   # also update intraday data
    schedules:
      # Intraday collection — runs during IDX trading hours (WIB)
      # 09:16, 10:16, 11:16, 14:16, 15:16, 16:16
      - cron: "16 9,10,11,14,15,16 * * 1-5"
        timezone: "Asia/Jakarta"
        active: true
      # 12:00 — before lunch break
      - cron: "0 12 * * 1-5"
        timezone: "Asia/Jakarta"
        active: true
      # 13:46 — after lunch break resumes
      - cron: "46 13 * * 1-5"
        timezone: "Asia/Jakarta"
        active: true

  # Weekly QuestDB local backup — creates a tar.gz you can copy to another machine
  - name: questdb-backup
    entrypoint: flows/backup_flow.py:questdb_backup_flow
    description: "Weekly QuestDB backup — consistent snapshot compressed to tar.gz in ./backups/"
    work_pool:
      name: default-agent-pool
    parameters:
      keep_local_backups: 3
    schedules:
      - cron: "30 16 * * 0"   # weekly every Sunday at 16:30 WIB
        timezone: "Asia/Jakarta"
        active: false          # enable when ready

  # Daily gap check & auto-fill — safety net after market close
  - name: gap-check
    entrypoint: flows/daily_collection_flow.py:gap_check_flow
    description: "Daily safety net: detect missing EOD data vs expected trading day, fill gaps automatically"
    work_pool:
      name: default-agent-pool
    # Same as daily-update: avoid piled-up late runs when the laptop wakes.
    concurrency_limit:
      limit: 1
      collision_strategy: CANCEL_NEW
    parameters:
      stocks_file: config/syariah_stocks.txt
      max_gap_days: 1       # flag stale if > 1 day behind expected
      lookback_days: 7      # re-fetch last 7 days when filling
      skip_intraday: false  # also fill intraday gaps
    schedules:
      # Weekly on Saturday 08:00 WIB (market closed weekends; fills the week's gaps).
      - cron: "0 8 * * 6"
        timezone: "Asia/Jakarta"
        active: true

  # Test run (5 stocks only)
  - name: test-run
    entrypoint: flows/daily_collection_flow.py:daily_collection_flow
    description: "Test run — 5 stocks only for validation"
    work_pool:
      name: default-agent-pool
    parameters:
      stocks_file: config/syariah_stocks.txt
      collect_price: true
      collect_actions: true
      intraday_days: 30
      skip_intraday: true
      skip_validation: true
      update_mode: false
      skip_duplicate_check: true
      limit: 5
    schedules: []  # manual only

  # Copy latest backup from container to host filesystem (runs on HOST worker, not in Docker)
  - name: backup-copy
    entrypoint: flows/backup_copy_flow.py:backup_copy_flow
    description: "Copy latest QuestDB backup from container /backup/ to host backups/ folder"
    work_pool:
      name: host-pool
    pull:
      - prefect.deployments.steps.set_working_directory:
          directory: /home/djp/eodhd_collector_optimized
    parameters:
      latest_only: true
    schedules: []  # manual only — trigger from UI after running questdb-backup

  # Weekly data quality check — OHLC validation, metadata cleanup, new symbols, partition monitor
  - name: data-quality
    entrypoint: flows/data_quality_flow.py:data_quality_flow
    description: "Weekly data quality: OHLC anomalies, metadata dedup, new symbol detection, partition sizing"
    work_pool:
      name: default-agent-pool
    parameters:
      stocks_file: config/syariah_stocks.txt
      lookback_days: 7
      spike_threshold: 0.5
      warn_partition_mb: 200
      run_cleanup: true
      run_ohlc: true
      run_symbols: true
      run_partitions: true
    schedules:
      - cron: "0 8 * * 6"   # Saturday 08:00 WIB (batched with gap-check)
        timezone: "Asia/Jakarta"
        active: true

  # Bulk last-day EOD/dividends/splits for the WHOLE exchange (1 request = 100 calls each,
  # vs ~651 per-symbol). INACTIVE until the bulk endpoint + exchange code are verified
  # after quota reset (run scripts/test_bulk.py). Activate, then drop EOD/actions from
  # daily-update so the savings materialise.
  - name: bulk-eod
    entrypoint: flows/daily_collection_flow.py:bulk_eod_flow
    description: "Bulk last-day EOD/div/splits for whole exchange (100 calls vs per-symbol)"
    work_pool:
      name: default-agent-pool
    concurrency_limit:
      limit: 1
      collision_strategy: CANCEL_NEW
    parameters:
      exchange: "JK"
      collect_eod: true
      collect_actions: true
    schedules:
      - cron: "30 20 * * 1-6"   # 20:30 WIB Mon-Sat — after close + after gap-check (20:00)
        timezone: "Asia/Jakarta"
        active: false           # ACTIVATE after verifying bulk works (post quota reset)
